global:
  scrape_interval: 15s       # How often Prometheus scrapes targets
  evaluation_interval: 15s   # How often rules are evaluated

scrape_configs:

  # ─── Scrape the Express Backend ─────────────────────────────────
  - job_name: 'urlshortener-backend'
    static_configs:
      - targets: ['backend:5000']   # Docker service name + port
    metrics_path: '/metrics'        # Our custom endpoint

  # ─── Scrape Prometheus itself ────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
