version: '3.8'

services:

  # ─── MongoDB Database ───────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: urlshortener-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  # ─── Express Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: urlshortener-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/urlshortener
      JWT_SECRET: your_super_secret_jwt_key_change_this_in_production
      BASE_URL: http://localhost
    depends_on:
      - mongo
    networks:
      - app-network
    labels:
      logging: "promtail"
      logging_jobname: "urlshortener-backend"

  # ─── Nginx + Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: urlshortener-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  # ─── Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: urlshortener-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"              # Prometheus UI: http://localhost:9090
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - app-network

  # ─── Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: urlshortener-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"              # Grafana UI: http://localhost:3000
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - app-network

  # ─── Loki (Log Aggregation) ─────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: urlshortener-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app-network

  # ─── Promtail (Log Shipper: Docker → Loki) ──────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: urlshortener-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - app-network


# ─── Shared Network ─────────────────────────────────────────────
networks:
  app-network:
    driver: bridge

# ─── Persistent Volumes ─────────────────────────────────────────
volumes:
  mongo-data:
  prometheus-data:
  grafana-data:
  loki-data:
